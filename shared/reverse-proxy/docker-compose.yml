version: "3.9"

services:
  reverse-proxy:
    image: nginx:stable
    container_name: soc-reverse-proxy
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro

      - ../../opencti/certs:/certs/opencti:ro
      - ../../cyberchef/certs:/certs/cyberchef:ro
      - ../../thehive/certs:/certs/thehive:ro
      - ../../cortex/certs:/certs/cortex:ro
      - ../../n8n/certs:/certs/n8n:ro
      - ../../shuffle/certs:/certs/shuffle:ro
      - ../../caldera/certs:/certs/caldera:ro
      - ../../navigator/certs:/certs/navigator:ro
      - ../../arkime/certs:/certs/arkime:ro
      - ../../velociraptor/certs:/certs/velociraptor:ro
    networks:
      - soc_shared

networks:
  soc_shared:
    external: true