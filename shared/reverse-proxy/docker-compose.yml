version: "3.9"

services:
  reverse-proxy:
    image: nginx:stable
    container_name: soc-reverse-proxy
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ../../Cyberchef/certs:/certs/cyberchef:ro
      - ../../Navigator/certs:/certs/navigator:ro
    networks:
      - soc_shared

networks:
  soc_shared:
    external: true