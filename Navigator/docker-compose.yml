version: "3.9"

services:
  navigator:
    image: nginx:stable
    container_name: navigator
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      TZ: ${TZ}
    volumes:
      - ./site:/usr/share/nginx/html:ro
    networks:
      - soc_shared

networks:
  soc_shared:
    external: true